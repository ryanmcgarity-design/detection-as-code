title: Net.exe Domain Reconnaissance
id: b8c9d0e1-f2a3-4567-1234-678901234567
status: test
description: Detects net.exe used for domain reconnaissance — enumerating domain groups, users, and admin membership. Commonly executed immediately after initial access to understand the target environment.
references:
    - https://attack.mitre.org/techniques/T1069/002/
    - https://attack.mitre.org/techniques/T1087/002/
author: Ryan McGarity
date: 2024-01-01
tags:
    - attack.discovery
    - attack.t1069.002
    - attack.t1087.002
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\net.exe'
        CommandLine|contains:
            - ' group '
            - ' localgroup '
            - ' user '
    domain_flag:
        CommandLine|contains: '/domain'
    condition: selection
falsepositives:
    - IT administrators performing user/group management
    - Helpdesk scripts
level: medium
