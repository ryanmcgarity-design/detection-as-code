title: PowerShell Suspicious Launch Flags
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: test
description: Detects PowerShell launched with a combination of flags commonly used in Empire and other frameworks to evade detection — non-interactive, hidden window, no profile.
references:
    - https://attack.mitre.org/techniques/T1059/001/
author: Ryan McGarity
date: 2024-01-01
tags:
    - attack.execution
    - attack.t1059.001
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\powershell.exe'
        CommandLine|contains|all:
            - ' -sta '
            - ' -w 1 '
            - ' -noP '
    condition: selection
falsepositives:
    - Some legitimate automation scripts
level: high
