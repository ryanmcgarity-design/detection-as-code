title: Remote Service Creation via SC.EXE
id: f6a7b8c9-d0e1-2345-f012-456789012345
status: test
description: Detects sc.exe used to create a service on a remote host, a technique used for lateral movement by deploying payloads as services on other systems.
references:
    - https://attack.mitre.org/techniques/T1021/002/
author: Ryan McGarity
date: 2024-01-01
tags:
    - attack.lateral_movement
    - attack.t1021.002
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\sc.exe'
        CommandLine|contains|all:
            - ' create '
            - 'binPath='
    remote:
        CommandLine|re: '\\\\[A-Za-z0-9_\-]+'
    condition: selection and remote
falsepositives:
    - Legitimate remote administration and software deployment
    - SCCM, Ansible, or other orchestration tools
level: high
