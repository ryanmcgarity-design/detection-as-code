title: PowerShell Encoded Command Execution
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: test
description: Detects PowerShell launched with an encoded command payload, a common technique to obfuscate malicious scripts.
references:
    - https://attack.mitre.org/techniques/T1059/001/
author: Ryan McGarity
date: 2024-01-01
tags:
    - attack.execution
    - attack.t1059.001
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\powershell.exe'
        CommandLine|contains:
            - ' -enc '
            - ' -encodedCommand '
            - ' -encodedcommand '
    condition: selection
falsepositives:
    - Legitimate software deployment tools that use encoded commands
    - SCCM or other management tools
level: medium
