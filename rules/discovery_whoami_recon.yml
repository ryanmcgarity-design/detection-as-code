title: Whoami Reconnaissance
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: test
description: Detects execution of whoami with enumeration flags, commonly used by attackers to identify the current user context and group memberships after initial access.
references:
    - https://attack.mitre.org/techniques/T1033/
author: Ryan McGarity
date: 2024-01-01
tags:
    - attack.discovery
    - attack.t1033
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\whoami.exe'
        CommandLine|contains:
            - '/all'
            - '/groups'
            - '/priv'
    condition: selection
falsepositives:
    - IT administrators running diagnostics
    - Monitoring agents
level: low
