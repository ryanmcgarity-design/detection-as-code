title: VBScript Execution via CMD
id: e5f6a7b8-c9d0-1234-ef01-345678901234
status: test
description: Detects cmd.exe executing a VBScript file, a persistence and execution technique used to launch payloads from disk via scripting engines.
references:
    - https://attack.mitre.org/techniques/T1059/005/
author: Ryan McGarity
date: 2024-01-01
tags:
    - attack.execution
    - attack.t1059.005
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\cmd.exe'
        CommandLine|contains: '.vbs'
    condition: selection
falsepositives:
    - Legitimate VBScript-based automation and management tools
    - Legacy software installers
level: medium
