title: Network Configuration Discovery via Ipconfig
id: d4e5f6a7-b8c9-0123-def0-234567890123
status: test
description: Detects ipconfig run with /all flag to enumerate network configuration, a common reconnaissance step after initial access.
references:
    - https://attack.mitre.org/techniques/T1016/
author: Ryan McGarity
date: 2024-01-01
tags:
    - attack.discovery
    - attack.t1016
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\ipconfig.exe'
        CommandLine|contains: '/all'
    condition: selection
falsepositives:
    - IT administrators and helpdesk staff running diagnostics
    - Monitoring scripts
level: low
