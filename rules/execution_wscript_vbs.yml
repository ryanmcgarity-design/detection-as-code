title: WScript VBScript Execution
id: a7b8c9d0-e1f2-3456-0123-567890123456
status: test
description: Detects wscript.exe executing a VBScript file. Attackers use WScript as an alternative to CMD for VBS payload execution to evade CMD-based detections.
references:
    - https://attack.mitre.org/techniques/T1059/005/
author: Ryan McGarity
date: 2024-01-01
tags:
    - attack.execution
    - attack.t1059.005
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\wscript.exe'
        CommandLine|contains: '.vbs'
    condition: selection
falsepositives:
    - Legitimate VBScript-based software installers and management tools
level: medium
